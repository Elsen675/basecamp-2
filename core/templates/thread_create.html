{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Yeni Mövzu — {{ project.name }}</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Mövzu başlığı</label>
        <input type="text" name="title" required>
        <button class="btn btn-primary" type="submit">Yarat</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-secondary">Geri</a>
    </form>
</div>
{% endblock %}
