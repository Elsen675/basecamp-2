{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Mesajı düzəlt</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Mesaj</label>
        <textarea name="content" rows="4" required>{{ message.content }}</textarea>
        <button class="btn btn-primary" type="submit">Yadda saxla</button>
        <a href="{% url 'thread_detail' message.thread.pk %}" class="btn btn-secondary">Geri</a>
    </form>
</div>
{% endblock %}
