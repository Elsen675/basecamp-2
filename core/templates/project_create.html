{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Yeni Layihə</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Layihə adı</label>
        <input type="text" name="name" required>
        <label>Təsvir</label>
        <textarea name="description" rows="4"></textarea>
        <button class="btn btn-primary" type="submit">Yarat</button>
        <a href="{% url 'project_list' %}" class="btn btn-secondary">Geri</a>
    </form>
</div>
{% endblock %}
