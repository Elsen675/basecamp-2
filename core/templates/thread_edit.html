{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Mövzunu düzəlt</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Mövzu başlığı</label>
        <input type="text" name="title" value="{{ thread.title }}" required>
        <button class="btn btn-primary" type="submit">Yadda saxla</button>
        <a href="{% url 'project_detail' thread.project.pk %}" class="btn btn-secondary">Geri</a>
    </form>
</div>
{% endblock %}
