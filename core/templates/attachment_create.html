{% extends 'base.html' %}
{% block content %}
<div class="card">
    <h2 style="margin-bottom: 20px;">Fayl əlavə et — {{ project.name }}</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <label>Fayl seç (png/jpg/pdf/txt)</label>
        <input type="file" name="file" accept=".png,.jpg,.pdf,.txt" required>
        <button class="btn btn-primary" type="submit">Yüklə</button>
        <a href="{% url 'project_detail' project.pk %}" class="btn btn-secondary">Geri</a>
    </form>
</div>
{% endblock %}
